<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Check It - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#007AFF",
              "background-light": "#F8F9FA",
              "background-dark": "#101922",
              "content-light": "#333333",
              "content-dark": "#EAEAEA",
              "subtle-light": "#6b7280",
              "subtle-dark": "#9ca3af",
              "border-light": "#D1D5DB",
              "border-dark": "#4B5563",
              "input-bg-light": "#FFFFFF",
              "input-bg-dark": "#1F2937",
              "error": "#E53935",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="flex h-auto min-h-screen w-full flex-col items-center justify-center p-4">
<div class="w-full max-w-md">
<!-- App Logo -->
<div class="flex justify-center mb-8">
<div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-primary">
<span class="material-symbols-outlined text-white text-4xl">
                        check_circle
                    </span>
</div>
</div>
<!-- Headline -->
<div class="text-center">
<h1 class="text-3xl font-bold tracking-tight text-content-light dark:text-content-dark">Create an Account</h1>
<p class="mt-2 text-base text-subtle-light dark:text-subtle-dark">Secure your devices with a free account.</p>
</div>
<!-- Registration Form -->
<div class="mt-8 space-y-6">
<!-- Full Name Field -->
<div class="relative">
<span class="material-symbols-outlined pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-subtle-light dark:text-subtle-dark">person</span>
<input class="form-input h-14 w-full rounded-lg border border-border-light bg-input-bg-light pl-12 pr-4 text-content-light placeholder:text-subtle-light focus:border-primary focus:ring-2 focus:ring-primary/20 dark:border-border-dark dark:bg-input-bg-dark dark:text-content-dark dark:placeholder:text-subtle-dark dark:focus:border-primary dark:focus:ring-primary/20" placeholder="Full Name" type="text"/>
</div>
<!-- Email Address Field -->
<div class="relative">
<span class="material-symbols-outlined pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-subtle-light dark:text-subtle-dark">mail</span>
<input class="form-input h-14 w-full rounded-lg border border-border-light bg-input-bg-light pl-12 pr-4 text-content-light placeholder:text-subtle-light focus:border-primary focus:ring-2 focus:ring-primary/20 dark:border-border-dark dark:bg-input-bg-dark dark:text-content-dark dark:placeholder:text-subtle-dark dark:focus:border-primary dark:focus:ring-primary/20" placeholder="your@email.com" type="email"/>
</div>
<!-- Password Field -->
<div class="relative">
<span class="material-symbols-outlined pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-subtle-light dark:text-subtle-dark">lock</span>
<input class="form-input h-14 w-full rounded-lg border border-border-light bg-input-bg-light pl-12 pr-12 text-content-light placeholder:text-subtle-light focus:border-primary focus:ring-2 focus:ring-primary/20 dark:border-border-dark dark:bg-input-bg-dark dark:text-content-dark dark:placeholder:text-subtle-dark dark:focus:border-primary dark:focus:ring-primary/20" placeholder="Password" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-4 top-1/2 -translate-y-1/2 text-subtle-light dark:text-subtle-dark">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<!-- Confirm Password Field with Error -->
<div>
<div class="relative">
<span class="material-symbols-outlined pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-subtle-light dark:text-subtle-dark">lock</span>
<input class="form-input h-14 w-full rounded-lg border border-error bg-input-bg-light pl-12 pr-4 text-content-light placeholder:text-subtle-light focus:border-error focus:ring-2 focus:ring-error/20 dark:bg-input-bg-dark dark:text-content-dark dark:placeholder:text-subtle-dark dark:focus:border-error dark:focus:ring-error/20" placeholder="Confirm Password" type="password"/>
</div>
<p class="mt-2 text-sm text-error">Passwords do not match.</p>
</div>
</div>
<!-- CTA Button -->
<div class="mt-8">
<button class="h-14 w-full rounded-lg bg-primary text-base font-semibold text-white transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark">Create Account</button>
</div>
<!-- Secondary Link -->
<div class="mt-8 text-center">
<p class="text-sm text-subtle-light dark:text-subtle-dark">
                    Already have an account?
                    <a class="font-semibold text-primary hover:underline" href="#">Log In</a>
</p>
</div>
</div>
</div>
</body></html>
