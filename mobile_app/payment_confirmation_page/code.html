<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Confirm Payment - Check It</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1173d4",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between bg-background-light dark:bg-background-dark sticky top-0 z-10">
<button class="text-slate-800 dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Confirm Payment</h2>
</div>
<main class="flex-grow px-4 pt-4 pb-32">
<!-- Recipient Information -->
<div class="flex flex-col items-center mb-6">
<div class="bg-slate-200 dark:bg-slate-700 rounded-full p-3 mb-3">
<span class="material-symbols-outlined text-slate-800 dark:text-slate-200" style="font-size: 32px;">storefront</span>
</div>
<h3 class="text-xl font-semibold text-slate-900 dark:text-white">Check It Inc.</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm">1-Year Premium Subscription</p>
</div>
<!-- Headline Text -->
<h1 class="text-slate-900 dark:text-white tracking-light text-[40px] font-bold leading-tight text-center pb-8 pt-2">$108.50</h1>
<!-- Order Summary Card -->
<div class="bg-white dark:bg-slate-800/50 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700/50">
<div class="p-4">
<div class="flex justify-between gap-x-6 py-2.5">
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">Subtotal</p>
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal text-right">$100.00</p>
</div>
<div class="flex justify-between gap-x-6 py-2.5">
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">Service Fee</p>
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal text-right">$2.50</p>
</div>
<div class="flex justify-between gap-x-6 py-2.5">
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">Taxes</p>
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal text-right">$6.00</p>
</div>
</div>
</div>
<!-- Payment Method Card -->
<div class="bg-white dark:bg-slate-800/50 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700/50 mt-5">
<div class="p-4">
<h4 class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal tracking-wide mb-3">PAYING WITH</h4>
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="bg-slate-100 dark:bg-slate-700 rounded-lg p-2 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-800 dark:text-slate-200">credit_card</span>
</div>
<div>
<p class="text-slate-900 dark:text-white font-semibold">Visa **** 1234</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Expires 08/26</p>
</div>
</div>
<button class="text-primary font-semibold text-sm hover:underline">Change</button>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-center gap-2 mb-4">
<span class="material-symbols-outlined text-sm text-slate-500 dark:text-slate-400">lock</span>
<p class="text-slate-500 dark:text-slate-400 text-xs">Secure SSL Transaction</p>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-4 rounded-xl text-lg transition-colors">Confirm &amp; Pay $108.50</button>
</div>
</div>
</body></html>
