<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Check It - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0A4D68", // Overriding primary with user-specified color
                        "secondary": "#088395",
                        "background-light": "#F5F5F5",
                        "background-dark": "#101922",
                        "text-light": "#333333",
                        "text-dark": "#F5F5F5",
                        "field-light": "#F5F5F5",
                        "field-dark": "#192633",
                        "border-light": "#e0e0e0",
                        "border-dark": "#324d67",
                        "placeholder-light": "#9e9e9e",
                        "placeholder-dark": "#92adc9",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.75rem", // Adjusted for a slightly more rounded, modern look
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="flex w-full max-w-md mx-auto grow flex-col p-6 pt-12">
<!-- Logo Header -->
<div class="flex justify-center items-center gap-3 mb-8">
<div class="text-primary flex items-center justify-center w-12 h-12 rounded-lg bg-primary/20">
<span class="material-symbols-outlined !text-3xl text-primary">verified_user</span>
</div>
<p class="text-3xl font-bold text-text-light dark:text-text-dark">Check It</p>
</div>
<!-- Headline -->
<h1 class="text-text-light dark:text-text-dark tracking-tight text-3xl font-bold leading-tight text-center pb-8">Welcome Back</h1>
<!-- Form -->
<div class="flex flex-col gap-4">
<!-- Email Field -->
<div class="flex flex-col">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-text-light dark:text-text-dark text-base font-medium leading-normal pb-2">Email</p>
<div class="relative flex w-full flex-1 items-stretch">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-placeholder-light dark:text-placeholder-dark">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light dark:text-text-dark focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-light dark:border-border-dark bg-field-light dark:bg-field-dark focus:border-primary h-14 placeholder:text-placeholder-light dark:placeholder:text-placeholder-dark p-[15px] pl-12 text-base font-normal leading-normal" placeholder="you@example.com" value=""/>
</div>
</label>
</div>
<!-- Password Field -->
<div class="flex flex-col">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-text-light dark:text-text-dark text-base font-medium leading-normal pb-2">Password</p>
<div class="relative flex w-full flex-1 items-stretch rounded-lg">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-placeholder-light dark:text-placeholder-dark">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light dark:text-text-dark focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-light dark:border-border-dark bg-field-light dark:bg-field-dark focus:border-primary h-14 placeholder:text-placeholder-light dark:placeholder:text-placeholder-dark p-[15px] pl-12 text-base font-normal leading-normal" placeholder="Enter your password" type="password" value=""/>
<button aria-label="Toggle password visibility" class="text-placeholder-light dark:text-placeholder-dark absolute inset-y-0 right-0 flex items-center justify-center pr-4">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-primary text-sm font-medium leading-normal pt-1 underline" href="#">Forgot Password?</a>
</div>
</div>
<!-- Login Button -->
<div class="mt-8">
<button class="flex w-full items-center justify-center rounded-lg bg-primary h-14 text-white text-base font-bold leading-normal transition-opacity hover:opacity-90">Login</button>
</div>
<!-- Sign Up Link -->
<div class="mt-auto pt-10 text-center">
<p class="text-text-light dark:text-text-dark text-sm font-normal leading-normal">
                    Don't have an account? <a class="text-primary font-bold underline" href="#">Sign Up</a>
</p>
</div>
</div>
</div>
</body></html>
