<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>User Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#0A4DAA",
              "background-light": "#F8F9FA",
              "background-dark": "#101922",
              "text-light": "#1D2129",
              "text-dark": "#F8F9FA",
              "secondary-text-light": "#6c757d",
              "secondary-text-dark": "#92adc9",
              "danger": "#DC3545",
              "surface-dark": "#182431",
              "surface-light": "#FFFFFF"
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-light dark:text-text-dark">
<div class="w-full max-w-md mx-auto min-h-screen">
<!-- Top App Bar -->
<div class="flex items-center p-4">
<div class="flex size-10 shrink-0 items-center justify-start text-text-light dark:text-text-dark">
<!-- Back icon can be added here if needed -->
</div>
<h1 class="text-lg font-bold flex-1 text-center">My Profile</h1>
<button aria-label="Edit Profile" class="flex w-10 h-10 items-center justify-end text-primary">
<span class="material-symbols-outlined text-2xl">edit</span>
</button>
</div>
<!-- Profile Header -->
<div class="flex flex-col items-center p-4">
<div class="relative">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full w-28 h-28" data-alt="User's profile picture, Jordan Smith" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBTvqdt3qir44XeOICz8BDdV9z8CaGmN6lQGAbDeDKsdONJzWdjd5Mfjb5RDt7QPbi0Vh0Lc1s9yDtG2BjFZvvjmeBARA8JMn_DfN4i_Uuk-v_X1068Tl5wRN3KKcBAKmQJaXUESkNgsY3shQ26f8UgAFrizq9Im_KrWk4mXg_PH-qhYsysYcXQuS83PTWa_1s4B64Kdv7dIhO_0pZzyb1NqKtB5kFSP8ZitCBKA7nl1H0hI5dd9fJ2uhWFqnD5wVNvBzz1kVX22osp");'></div>
</div>
<div class="flex flex-col items-center justify-center mt-4">
<p class="text-[22px] font-bold">Jordan Smith</p>
<p class="text-secondary-text-light dark:text-secondary-text-dark text-base font-normal">Administrator</p>
</div>
</div>
<div class="px-4 py-6 flex flex-col gap-8">
<!-- Personal Details Section -->
<div class="flex flex-col gap-2">
<h2 class="text-base font-semibold text-secondary-text-light dark:text-secondary-text-dark px-4 pb-2">Personal Details</h2>
<div class="flex flex-col bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm overflow-hidden">
<div class="flex items-center gap-4 px-4 h-16">
<div class="flex items-center justify-center rounded-full bg-primary/10 text-primary shrink-0 size-10">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<p class="text-base font-normal flex-1 truncate">jordan.smith@email.com</p>
</div>
<div class="border-t border-gray-200 dark:border-gray-700/50 mx-4"></div>
<div class="flex items-center gap-4 px-4 h-16">
<div class="flex items-center justify-center rounded-full bg-primary/10 text-primary shrink-0 size-10">
<span class="material-symbols-outlined text-xl">phone</span>
</div>
<p class="text-base font-normal flex-1 truncate">+1 123-456-7890</p>
</div>
</div>
</div>
<!-- Account Management Section -->
<div class="flex flex-col gap-2">
<h2 class="text-base font-semibold text-secondary-text-light dark:text-secondary-text-dark px-4 pb-2">Account Management</h2>
<div class="flex flex-col bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm overflow-hidden">
<a class="flex items-center gap-4 px-4 h-16 group" href="#">
<div class="flex items-center justify-center rounded-full bg-primary/10 text-primary shrink-0 size-10">
<span class="material-symbols-outlined text-xl">shield</span>
</div>
<p class="text-base font-normal flex-1 truncate">Security Settings</p>
<span class="material-symbols-outlined text-secondary-text-light dark:text-secondary-text-dark group-hover:translate-x-1 transition-transform">chevron_right</span>
</a>
<div class="border-t border-gray-200 dark:border-gray-700/50 mx-4"></div>
<a class="flex items-center gap-4 px-4 h-16 group" href="#">
<div class="flex items-center justify-center rounded-full bg-primary/10 text-primary shrink-0 size-10">
<span class="material-symbols-outlined text-xl">devices</span>
</div>
<p class="text-base font-normal flex-1 truncate">My Registered Devices</p>
<span class="material-symbols-outlined text-secondary-text-light dark:text-secondary-text-dark group-hover:translate-x-1 transition-transform">chevron_right</span>
</a>
</div>
</div>
<!-- Logout Button -->
<div class="pt-4">
<button class="flex items-center justify-center gap-2 w-full h-12 rounded-xl bg-danger/10 text-danger font-semibold transition-colors hover:bg-danger/20">
<span class="material-symbols-outlined">logout</span>
<span>Logout</span>
</button>
</div>
</div>
</div>
</body></html>
