<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Check It - Admin Device View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1173d4",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative min-h-screen w-full flex-col">
<!-- Top App Bar -->
<header class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-gray-200 dark:border-gray-800">
<button class="text-gray-800 dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-gray-200 dark:hover:bg-white/10">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-gray-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">MacBook Pro 14</h1>
<div class="size-10"></div>
</header>
<main class="flex-1 pb-28">
<!-- Carousel -->
<div class="flex overflow-x-auto [-ms-scrollbar-style:none] [scrollbar-width:none] [&amp;::-webkit-scrollbar]:hidden py-4">
<div class="flex items-stretch px-4 gap-3">
<div class="flex h-full flex-1 flex-col gap-4 rounded-lg min-w-60">
<div class="w-full bg-center bg-no-repeat aspect-video bg-cover rounded-lg flex flex-col" data-alt="Front view of a silver MacBook Pro" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC3TPn4lnLRDwH6mE5-qU8-G6UK5pJbggHVGJn9se5skwng5pzajTiltnEOSz5ze8Ovpdl8TyUQaWdLQe_9McHbvHOzDtVnimksnWylze0DGLjTuWXXGm56F0OSaf92HR1NpIpiYI_YdJPeLq2HPVNjPMUO1ZWGyt2SCxUe7M5QC5hsF2PxckaMnx912LVbw52jFtmN1gd_bfhPIALneTpZkc9AHnx3fFpW_m-l9tyLci9br1H4A_9W3lMFP_Oep4VPcw1lt08Hmo8v");'></div>
</div>
<div class="flex h-full flex-1 flex-col gap-4 rounded-lg min-w-60">
<div class="w-full bg-center bg-no-repeat aspect-video bg-cover rounded-lg flex flex-col" data-alt="Keyboard and screen of the MacBook Pro" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAOUk1elNo3T34mb_m3uebLw5R4_pQjRo6R5mHw4s2xS-puaSwQflVOCwdhc8dg18-al07P5SomVghjVinWriaz2gIz_oYuSoxW0pp3-N32QJTXEFSLrab_zH0KJ6y2cbjMlN5rIGplIUIjdLIZ6VwLy5adao1hyDEB21p5s_JCLWO8gHngy9pGPzByDjCppWRGfPqgQ6sdLxtXZHRIDF9BOeLH-PAQ4iWrkC0NjR7eSj6zvCrptyZ14lGxhhU52m0DFCM6ji3XRsyT");'></div>
</div>
<div class="flex h-full flex-1 flex-col gap-4 rounded-lg min-w-60">
<div class="w-full bg-center bg-no-repeat aspect-video bg-cover rounded-lg flex flex-col" data-alt="Side profile of the MacBook Pro showing ports" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAI3quZdoLeINdytPjFCBH0ZT_kyVwM6Xpns3dAlrWccz3-rTB7Kvm9zHD_tpxItE2iyvGzWOafxz1Cgzwyu6susQX4UhCe_41yKAmVnfKkpGoIe0miXnc822Rwewf5fIuphgjI4RHxLgB7tz8R-YHEkMcfREsVIhejCgibK9JZXxyXO_4ZdNwgaAAfQO0w7Pa9W5zbgsGL61er5S96QFlan7ANAA_jzW2sdjoP0byIeb7mqcY7gsKYLK1ZmshdVedlnBkBOpmsRKz6");'></div>
</div>
</div>
</div>
<!-- Chips / Status -->
<div class="flex gap-3 p-4 flex-wrap">
<div class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-[#FFC107]/20 px-3">
<p class="text-[#FFC107] text-sm font-medium leading-normal">Pending</p>
</div>
<div class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary/20 px-3">
<p class="text-primary text-sm font-medium leading-normal">New</p>
</div>
</div>
<!-- Description List / Summary Card -->
<div class="px-4">
<div class="bg-gray-50 dark:bg-white/5 rounded-xl p-4 grid grid-cols-[30%_1fr] gap-x-4">
<div class="col-span-2 grid grid-cols-subgrid border-b border-gray-200 dark:border-white/10 py-3">
<p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal">Model</p>
<p class="text-gray-900 dark:text-white text-sm font-medium leading-normal">MacBook Pro 14-inch (2023)</p>
</div>
<div class="col-span-2 grid grid-cols-subgrid border-b border-gray-200 dark:border-white/10 py-3">
<p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal">Serial Number</p>
<p class="text-gray-900 dark:text-white text-sm font-medium leading-normal">C02G8034Q05F</p>
</div>
<div class="col-span-2 grid grid-cols-subgrid pt-3">
<p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal">Owner Name</p>
<p class="text-gray-900 dark:text-white text-sm font-medium leading-normal">Jane Doe</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="p-4 grid grid-cols-2 gap-3">
<button class="flex w-full items-center justify-center gap-x-2 rounded-lg bg-gray-200 dark:bg-white/10 px-4 py-2.5 text-sm font-semibold text-gray-800 dark:text-white hover:bg-gray-300 dark:hover:bg-white/20">
<span class="material-symbols-outlined text-base">receipt_long</span>
                    Proof of Purchase
                </button>
<button class="flex w-full items-center justify-center gap-x-2 rounded-lg bg-gray-200 dark:bg-white/10 px-4 py-2.5 text-sm font-semibold text-gray-800 dark:text-white hover:bg-gray-300 dark:hover:bg-white/20">
<span class="material-symbols-outlined text-base">mail</span>
                    Contact Owner
                </button>
</div>
<!-- Accordions -->
<div class="flex flex-col p-4 gap-3">
<details class="flex flex-col rounded-xl border border-gray-200 dark:border-white/10 bg-transparent px-4 py-1.5 group">
<summary class="flex cursor-pointer list-none items-center justify-between gap-6 py-2">
<p class="text-gray-900 dark:text-white text-sm font-medium leading-normal">Device History</p>
<div class="text-gray-600 dark:text-gray-400 group-open:rotate-180 transition-transform duration-200">
<span class="material-symbols-outlined text-xl">expand_more</span>
</div>
</summary>
<div class="text-gray-600 dark:text-gray-400 text-sm font-normal leading-normal pb-3">
<ul class="space-y-2 mt-2">
<li class="text-xs">Jul 20, 2024, 10:05 AM - Status changed to <span class="font-semibold text-yellow-500">Pending</span> by Admin</li>
<li class="text-xs">Jul 20, 2024, 09:30 AM - Device registered by Jane Doe</li>
</ul>
</div>
</details>
<details class="flex flex-col rounded-xl border border-gray-200 dark:border-white/10 bg-transparent px-4 py-1.5 group" open="">
<summary class="flex cursor-pointer list-none items-center justify-between gap-6 py-2">
<p class="text-gray-900 dark:text-white text-sm font-medium leading-normal">Admin Notes</p>
<div class="text-gray-600 dark:text-gray-400 group-open:rotate-180 transition-transform duration-200">
<span class="material-symbols-outlined text-xl">expand_more</span>
</div>
</summary>
<div class="text-gray-600 dark:text-gray-400 text-sm font-normal leading-normal pb-2">
<textarea class="mt-2 block w-full rounded-lg border-gray-300 dark:border-gray-700 bg-gray-100 dark:bg-gray-900/50 p-3 text-sm text-gray-800 dark:text-gray-200 placeholder-gray-400 focus:border-primary focus:ring-primary" placeholder="Add a note..." rows="4">Initial review pending. User has submitted proof of purchase.</textarea>
<button class="mt-2 w-full rounded-lg bg-primary/20 px-4 py-2 text-sm font-semibold text-primary hover:bg-primary/30">
                            Save Note
                        </button>
</div>
</details>
</div>
</main>
<!-- Floating Action Button -->
<div class="fixed bottom-6 right-6 z-20">
<button class="flex items-center justify-center gap-2 rounded-full bg-primary h-14 w-14 shadow-lg hover:bg-primary/90 text-white">
<span class="material-symbols-outlined text-2xl">published_with_changes</span>
</button>
</div>
</div>
</body></html>
