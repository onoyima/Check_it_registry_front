<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Check It - Manage Devices</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#005A9C",
              "background-light": "#F5F5F7",
              "background-dark": "#101922",
              "status-registered": "#34C759",
              "status-pending": "#FF9500",
              "status-transferred": "#8E8E93"
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative mx-auto flex h-auto min-h-screen w-full max-w-md flex-col overflow-x-hidden">
<!-- Sticky Header -->
<div class="sticky top-0 z-10 flex flex-col gap-2 bg-background-light/80 p-4 pb-2 backdrop-blur-sm dark:bg-background-dark/80">
<div class="flex h-12 items-center justify-between">
<p class="text-xl font-bold text-slate-900 dark:text-white">Manage Devices</p>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-primary px-4 text-sm font-medium text-white">
<span class="material-symbols-outlined text-base">add</span>
<span>Register New</span>
</button>
</div>
</div>
<!-- Search and Filter Section -->
<div class="sticky top-[80px] z-10 flex items-center gap-3 bg-background-light/80 px-4 py-3 backdrop-blur-sm dark:bg-background-dark/80">
<label class="flex h-12 w-full min-w-40 flex-col">
<div class="flex h-full w-full flex-1 items-stretch rounded-lg">
<div class="flex items-center justify-center rounded-l-lg border border-slate-300 bg-slate-200/50 pl-4 dark:border-slate-700 dark:bg-slate-800">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-r-lg border border-l-0 border-slate-300 bg-white p-0 px-3 text-base font-normal leading-normal text-slate-900 placeholder:text-slate-500 focus:outline-0 focus:ring-0 dark:border-slate-700 dark:bg-slate-900 dark:text-white dark:placeholder:text-slate-400" placeholder="Search by name, serial number..." value=""/>
</div>
</label>
<button class="flex size-12 shrink-0 items-center justify-center rounded-lg border border-slate-300 bg-white dark:border-slate-700 dark:bg-slate-900">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">tune</span>
</button>
</div>
<!-- Filter Chips -->
<div class="flex gap-3 overflow-x-auto px-4 py-2 pb-4 [-ms-overflow-style:none] [scrollbar-width:none] [&amp;::-webkit-scrollbar]:hidden">
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full border border-primary/50 bg-primary/20 px-4">
<p class="text-sm font-medium text-primary dark:text-sky-300">All</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full border border-slate-300 bg-white px-4 dark:border-slate-700 dark:bg-slate-800">
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Registered</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full border border-slate-300 bg-white px-4 dark:border-slate-700 dark:bg-slate-800">
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Pending</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full border border-slate-300 bg-white px-4 dark:border-slate-700 dark:bg-slate-800">
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Transferred</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full border border-slate-300 bg-white px-4 dark:border-slate-700 dark:bg-slate-800">
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Laptop</p>
</button>
</div>
<!-- Device List -->
<div class="flex flex-col gap-px px-4">
<!-- List Item 1 -->
<div class="flex cursor-pointer items-center justify-between gap-4 rounded-lg bg-white p-3 transition-colors hover:bg-slate-50 dark:bg-slate-800/50 dark:hover:bg-slate-800">
<div class="flex items-center gap-4">
<div class="flex size-12 shrink-0 items-center justify-center rounded-lg bg-slate-200 dark:bg-slate-700">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">laptop_mac</span>
</div>
<div class="flex flex-1 flex-col justify-center">
<p class="text-base font-medium text-slate-900 dark:text-white">MacBook Pro 16-inch</p>
<p class="text-sm font-normal text-slate-500 dark:text-slate-400">S/N: F17G8...K1G3</p>
<div class="mt-1 flex items-center gap-1.5">
<div class="size-2 rounded-full bg-status-registered"></div>
<p class="text-xs font-medium text-status-registered">Registered</p>
</div>
</div>
</div>
<div class="flex items-center gap-2">
<button class="text-sm font-semibold text-primary">Transfer</button>
</div>
</div>
<!-- List Item 2 -->
<div class="flex cursor-pointer items-center justify-between gap-4 rounded-lg bg-white p-3 transition-colors hover:bg-slate-50 dark:bg-slate-800/50 dark:hover:bg-slate-800">
<div class="flex items-center gap-4">
<div class="flex size-12 shrink-0 items-center justify-center rounded-lg bg-slate-200 dark:bg-slate-700">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">phone_iphone</span>
</div>
<div class="flex flex-1 flex-col justify-center">
<p class="text-base font-medium text-slate-900 dark:text-white">iPhone 14 Pro</p>
<p class="text-sm font-normal text-slate-500 dark:text-slate-400">S/N: G99H2...L4P5</p>
<div class="mt-1 flex items-center gap-1.5">
<div class="size-2 rounded-full bg-status-pending"></div>
<p class="text-xs font-medium text-status-pending">Pending Transfer</p>
</div>
</div>
</div>
<div class="flex items-center gap-2">
<button class="text-sm font-semibold text-primary">View</button>
</div>
</div>
<!-- List Item 3 -->
<div class="flex cursor-pointer items-center justify-between gap-4 rounded-lg bg-white p-3 transition-colors hover:bg-slate-50 dark:bg-slate-800/50 dark:hover:bg-slate-800">
<div class="flex items-center gap-4">
<div class="flex size-12 shrink-0 items-center justify-center rounded-lg bg-slate-200 dark:bg-slate-700">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">tablet_mac</span>
</div>
<div class="flex flex-1 flex-col justify-center">
<p class="text-base font-medium text-slate-900 dark:text-white">iPad Air</p>
<p class="text-sm font-normal text-slate-500 dark:text-slate-400">S/N: C34J1...M7P2</p>
<div class="mt-1 flex items-center gap-1.5">
<div class="size-2 rounded-full bg-status-transferred"></div>
<p class="text-xs font-medium text-status-transferred">Transferred</p>
</div>
</div>
</div>
<div class="flex items-center gap-2">
<button class="text-sm font-semibold text-slate-500 dark:text-slate-400">History</button>
</div>
</div>
<!-- List Item 4 -->
<div class="flex cursor-pointer items-center justify-between gap-4 rounded-lg bg-white p-3 transition-colors hover:bg-slate-50 dark:bg-slate-800/50 dark:hover:bg-slate-800">
<div class="flex items-center gap-4">
<div class="flex size-12 shrink-0 items-center justify-center rounded-lg bg-slate-200 dark:bg-slate-700">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">watch</span>
</div>
<div class="flex flex-1 flex-col justify-center">
<p class="text-base font-medium text-slate-900 dark:text-white">Apple Watch Ultra</p>
<p class="text-sm font-normal text-slate-500 dark:text-slate-400">S/N: K12L9...N8Q1</p>
<div class="mt-1 flex items-center gap-1.5">
<div class="size-2 rounded-full bg-status-registered"></div>
<p class="text-xs font-medium text-status-registered">Registered</p>
</div>
</div>
</div>
<div class="flex items-center gap-2">
<button class="text-sm font-semibold text-primary">Transfer</button>
</div>
</div>
</div>
<div class="flex-grow"></div> <!-- Spacer to push nav to bottom -->
<!-- Bottom Navigation Bar -->
<div class="sticky bottom-0 mt-8 flex h-20 w-full items-start justify-around border-t border-slate-200 bg-background-light/80 pt-2 backdrop-blur-sm dark:border-slate-800 dark:bg-background-dark/80">
<button class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">home</span>
<span class="text-xs font-medium">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">inventory_2</span>
<span class="text-xs font-medium">Devices</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">qr_code_scanner</span>
<span class="text-xs font-medium">Scan</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">person</span>
<span class="text-xs font-medium">Profile</span>
</button>
</div>
</div>
</body></html>
