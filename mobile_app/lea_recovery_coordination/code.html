<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Device Recovery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1173d4",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "card-light": "#ffffff",
                        "card-dark": "#192633",
                        "text-primary-light": "#1C1C1E",
                        "text-primary-dark": "#ffffff",
                        "text-secondary-light": "#8E8E93",
                        "text-secondary-dark": "#92adc9",
                        "border-light": "#E5E5EA",
                        "border-dark": "#384553",
                        "success": "#28A745",
                        "danger": "#DC3545",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px",
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col">
<!-- Top App Bar -->
<div class="sticky top-0 z-10 flex items-center bg-background-light/80 dark:bg-background-dark/80 p-4 pb-3 backdrop-blur-sm">
<div class="flex size-10 shrink-0 items-center justify-start text-text-primary-light dark:text-text-primary-dark">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h1 class="flex-1 text-center text-lg font-bold leading-tight tracking-[-0.015em] text-text-primary-light dark:text-text-primary-dark">Device Recovery</h1>
<div class="w-10"></div>
</div>
<div class="flex flex-col gap-6 p-4 pb-28">
<!-- Device Details Section -->
<section>
<h2 class="px-1 pb-2 text-base font-bold leading-tight text-text-primary-light dark:text-text-primary-dark">Device Details</h2>
<div class="flex items-stretch justify-between gap-4 rounded-xl bg-card-light dark:bg-card-dark p-4 shadow-sm">
<div class="flex flex-col gap-1.5 flex-[2_2_0px]">
<p class="text-base font-bold leading-tight text-text-primary-light dark:text-text-primary-dark">Jane's MacBook Pro 14</p>
<p class="text-sm font-normal leading-normal text-text-secondary-light dark:text-text-secondary-dark">Serial: FVH12345XYZ</p>
<p class="text-sm font-normal leading-normal text-text-secondary-light dark:text-text-secondary-dark">Reported: May 10, 2024</p>
</div>
<div class="w-full flex-1 rounded-lg bg-cover bg-center bg-no-repeat" data-alt="Image of a silver MacBook Pro" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBpkiEfZ66RtCqCubgyTkCZaEuh43mod7tQbGKCQBFFbD-CdPv1tayhXrbmFd7uNnzblzSeKJdI5MDwIOpSNCTGRuaKRc5m9jhMWC3Qq1WrRRoffrq17dvro2Z3KJJJpzaWTyjvfomcKqD71ClkciIl9ODVE1NUIxmi68TspX3sKzhK1Zy6E-jVPyCfBlKpIwv7GJc8PmXYpHYnh8o7Mt-vUTaj_ogP13GJnCJGzvpPuFtpsnD0ENP0Rr0qjjcnk_992uZkYrBbpjvS");'></div>
</div>
</section>
<!-- Owner Information Section -->
<section>
<h2 class="px-1 pb-2 text-base font-bold leading-tight text-text-primary-light dark:text-text-primary-dark">Owner Information</h2>
<div class="rounded-xl bg-card-light dark:bg-card-dark shadow-sm">
<div class="flex items-center gap-4 px-4 py-3">
<div class="h-14 w-14 flex-shrink-0 rounded-full bg-cover bg-center bg-no-repeat" data-alt="Profile picture of Jane Doe" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAS9-H25gKkxlGX1bDNUJCF4AQJUpljj8SJZiu6vPAlthm-udCcbgZ70m3mp9tCUXJOjbWi1ExKFAtRLk_7cdUaFN4CxWpya3aBMcgIwDRf5hmtVpt1hF_lglkDHaCGvIQpH1qD766vH_gm1gUChtMy23xpyEnvcdVFb6qn4U5AxyVuQ8OEF5jknQpVYmedzgzYnAKxBrN6X06Mh_-RnbkGbUW9aeb5GrEwVK_khGVN39uhcV87A4gHNfNOSSDW8FbBL8m1-32K1ZuJ");'></div>
<div class="flex flex-col justify-center">
<p class="text-base font-medium leading-normal text-text-primary-light dark:text-text-primary-dark">Jane Doe</p>
<p class="text-sm font-normal leading-normal text-text-secondary-light dark:text-text-secondary-dark">+1 (555) 123-4567</p>
</div>
</div>
<div class="grid grid-cols-2 gap-px border-t border-border-light dark:border-border-dark bg-border-light dark:bg-border-dark">
<button class="flex items-center justify-center gap-2 bg-card-light dark:bg-card-dark py-3 text-sm font-medium text-primary">
<span class="material-symbols-outlined !text-xl">call</span>
                            Call Owner
                        </button>
<button class="flex items-center justify-center gap-2 bg-card-light dark:bg-card-dark py-3 text-sm font-medium text-primary">
<span class="material-symbols-outlined !text-xl">sms</span>
                            Message Owner
                        </button>
</div>
</div>
</section>
<!-- Status Update Section -->
<section>
<h2 class="px-1 pb-2 text-base font-bold leading-tight text-text-primary-light dark:text-text-primary-dark">Update Recovery Status</h2>
<div class="flex flex-col gap-4 rounded-xl bg-card-light dark:bg-card-dark p-4 shadow-sm">
<div class="grid grid-cols-1 gap-3">
<label class="flex cursor-pointer items-center gap-3 rounded-lg border border-border-light dark:border-border-dark p-3 has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<input checked="" class="h-5 w-5 border-gray-400 text-primary focus:ring-primary dark:border-gray-500" name="recovery_status" type="radio"/>
<span class="text-sm font-medium text-text-primary-light dark:text-text-primary-dark">Recovered by LEA</span>
</label>
<label class="flex cursor-pointer items-center gap-3 rounded-lg border border-border-light dark:border-border-dark p-3 has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<input class="h-5 w-5 border-gray-400 text-primary focus:ring-primary dark:border-gray-500" name="recovery_status" type="radio"/>
<span class="text-sm font-medium text-text-primary-light dark:text-text-primary-dark">Ready for Pickup</span>
</label>
<label class="flex cursor-pointer items-center gap-3 rounded-lg border border-border-light dark:border-border-dark p-3 has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<input class="h-5 w-5 border-gray-400 text-primary focus:ring-primary dark:border-gray-500" name="recovery_status" type="radio"/>
<span class="text-sm font-medium text-text-primary-light dark:text-text-primary-dark">Returned to Owner</span>
</label>
</div>
<div>
<label class="mb-1.5 block text-sm font-medium text-text-secondary-light dark:text-text-secondary-dark" for="recovery-notes">Add Recovery Notes (Optional)</label>
<textarea class="w-full rounded-lg border-border-light bg-background-light p-3 text-sm text-text-primary-light placeholder-text-secondary-light/80 focus:border-primary focus:ring-primary dark:border-border-dark dark:bg-background-dark dark:text-text-primary-dark dark:placeholder-text-secondary-dark/80" id="recovery-notes" placeholder="e.g., Device recovered from 123 Main St. in good condition..." rows="4"></textarea>
</div>
</div>
</section>
</div>
<!-- Sticky Footer with Action Buttons -->
<div class="fixed bottom-0 left-0 right-0 z-10 w-full border-t border-border-light bg-card-light/80 p-4 backdrop-blur-sm dark:border-border-dark dark:bg-card-dark/80">
<div class="flex flex-col gap-3">
<button class="w-full rounded-xl bg-primary px-4 py-3.5 text-base font-bold text-white shadow-sm transition-colors hover:bg-primary/90">
                    Update Status &amp; Notify Owner
                </button>
<button class="w-full rounded-xl bg-transparent px-4 py-3.5 text-base font-bold text-primary transition-colors hover:bg-primary/10">
                    Save as Draft
                </button>
</div>
</div>
</div>
</body></html>
