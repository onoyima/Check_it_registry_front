<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Devices - Check It</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4A90E2",
              "background-light": "#F8F9FA",
              "background-dark": "#101922",
              "status-verified": "#7ED321",
              "status-stolen": "#D0021B",
              "status-lost": "#F5A623",
              "text-light-primary": "#333333",
              "text-dark-primary": "#FFFFFF",
              "text-light-secondary": "#6b7280",
              "text-dark-secondary": "#9ca3af",
              "card-light": "#FFFFFF",
              "card-dark": "#1e293b",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: { "DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px" },
          },
        },
      }
    </script>
<style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative mx-auto flex h-auto min-h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<header class="sticky top-0 z-10 flex h-16 items-center justify-between bg-background-light/80 px-4 py-2 backdrop-blur-sm dark:bg-background-dark/80">
<h1 class="text-xl font-bold text-text-light-primary dark:text-text-dark-primary">My Devices</h1>
<button class="flex h-10 w-10 cursor-pointer items-center justify-center rounded-full text-text-light-primary dark:text-text-dark-primary">
<span class="material-symbols-outlined text-2xl">search</span>
</button>
</header>
<!-- Main Content: Device List -->
<main class="flex-1 space-y-3 p-4">
<!-- Device Item 1: Verified -->
<div class="flex cursor-pointer items-center gap-4 rounded-lg bg-card-light p-4 shadow-sm transition-all hover:shadow-md dark:bg-card-dark">
<div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">phone_iphone</span>
</div>
<div class="flex-1">
<p class="font-semibold text-text-light-primary dark:text-text-dark-primary">Jane's iPhone 14 Pro</p>
<p class="text-sm text-text-light-secondary dark:text-text-dark-secondary">Apple iPhone 14 Pro</p>
</div>
<div class="flex items-center gap-2">
<div class="rounded-full bg-status-verified/20 px-3 py-1 text-xs font-medium text-status-verified">
                        Verified
                    </div>
<span class="material-symbols-outlined text-lg text-text-light-secondary dark:text-text-dark-secondary">chevron_right</span>
</div>
</div>
<!-- Device Item 2: Stolen -->
<div class="flex cursor-pointer items-center gap-4 rounded-lg bg-card-light p-4 shadow-sm transition-all hover:shadow-md dark:bg-card-dark">
<div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">laptop_mac</span>
</div>
<div class="flex-1">
<p class="font-semibold text-text-light-primary dark:text-text-dark-primary">Work Laptop</p>
<p class="text-sm text-text-light-secondary dark:text-text-dark-secondary">MacBook Pro 16"</p>
</div>
<div class="flex items-center gap-2">
<div class="rounded-full bg-status-stolen/20 px-3 py-1 text-xs font-medium text-status-stolen">
                        Stolen
                    </div>
<span class="material-symbols-outlined text-lg text-text-light-secondary dark:text-text-dark-secondary">chevron_right</span>
</div>
</div>
<!-- Device Item 3: Lost -->
<div class="flex cursor-pointer items-center gap-4 rounded-lg bg-card-light p-4 shadow-sm transition-all hover:shadow-md dark:bg-card-dark">
<div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">tablet_mac</span>
</div>
<div class="flex-1">
<p class="font-semibold text-text-light-primary dark:text-text-dark-primary">Personal Tablet</p>
<p class="text-sm text-text-light-secondary dark:text-text-dark-secondary">Apple iPad Air</p>
</div>
<div class="flex items-center gap-2">
<div class="rounded-full bg-status-lost/20 px-3 py-1 text-xs font-medium text-status-lost">
                        Lost
                    </div>
<span class="material-symbols-outlined text-lg text-text-light-secondary dark:text-text-dark-secondary">chevron_right</span>
</div>
</div>
<!-- Skeleton Loader Example (can be shown during loading) -->

            <div class="flex animate-pulse items-center gap-4 rounded-lg bg-card-light p-4 shadow-sm dark:bg-card-dark">

                <div class="flex-1 space-y-2">
                    <div class="h-4 w-3/4 rounded bg-gray-200 dark:bg-gray-700"></div>
                    <div class="h-3 w-1/2 rounded bg-gray-200 dark:bg-gray-700"></div>
                </div>
                <div class="h-6 w-20 rounded-full bg-gray-200 dark:bg-gray-700"></div>
            </div>
            -->
<!-- Empty State Example (can be shown when list is empty) -->
<!--
            <div class="flex flex-col items-center justify-center px-4 py-16 text-center">
                <div class="mb-6 flex h-24 w-24 items-center justify-center rounded-full bg-primary/10 text-primary">
                    <span class="material-symbols-outlined text-5xl">devices</span>
                </div>
                <p class="text-lg font-bold text-text-light-primary dark:text-text-dark-primary">No Devices Registered</p>
                <p class="mt-2 max-w-xs text-sm text-text-light-secondary dark:text-text-dark-secondary">Protect your devices by adding them to your registry. It's the first step to securing your valuable electronics.</p>
                <button class="mt-6 flex h-11 min-w-[84px] cursor-pointer items-center justify-center gap-2 overflow-hidden rounded-lg bg-primary px-6 text-sm font-bold text-white shadow-lg transition-all hover:bg-primary/90">
                    <span class="material-symbols-outlined">add_circle</span>
                    <span>Add Device</span>
                </button>
            </div>
            -->
</main>
<!-- Floating Action Button -->
<button class="absolute bottom-6 right-6 flex h-14 w-14 cursor-pointer items-center justify-center rounded-full bg-primary text-white shadow-lg transition-transform hover:scale-105 active:scale-95">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
</body></html>
