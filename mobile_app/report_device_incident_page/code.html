<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Report an Incident</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4A90E2",
                        "background-light": "#F4F4F8",
                        "background-dark": "#101922",
                        "neutral-text-light": "#4A4A4A",
                        "neutral-text-dark": "#F4F4F8",
                        "neutral-subtle-light": "#E0E0E0",
                        "neutral-subtle-dark": "#324d67",
                        "input-bg-light": "#FFFFFF",
                        "input-bg-dark": "#192633",
                        "placeholder-light": "#A0AEC0",
                        "placeholder-dark": "#92adc9",
                        "accent-green": "#50E3C2",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative mx-auto flex h-auto min-h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark group/design-root" style='font-family: Inter, "Noto Sans", sans-serif;'>
<!-- Top App Bar -->
<div class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-neutral-text-light dark:text-neutral-text-dark flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h1 class="text-neutral-text-light dark:text-neutral-text-dark text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Report an Incident</h1>
<div class="w-12"></div> <!-- Spacer for centering title -->
</div>
<!-- Progress Indicator -->
<div class="px-4 py-2">
<div class="w-full bg-neutral-subtle-light dark:bg-neutral-subtle-dark rounded-full h-1.5">
<div class="bg-accent-green h-1.5 rounded-full" style="width: 33%"></div>
</div>
</div>
<div class="flex flex-col gap-2 px-4 py-2">
<!-- Section Header: What happened -->
<h2 class="text-neutral-text-light dark:text-neutral-text-dark text-[22px] font-bold leading-tight tracking-[-0.015em] pt-5 pb-3">What happened to your device?</h2>
<!-- Segmented Buttons: Incident Type -->
<div class="flex">
<div class="flex h-10 flex-1 items-center justify-center rounded-lg bg-neutral-subtle-light dark:bg-neutral-subtle-dark/40 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:shadow-[0_0_4px_rgba(0,0,0,0.1)] has-[:checked]:text-white text-neutral-text-light dark:text-placeholder-dark text-sm font-medium leading-normal">
<span class="truncate">Misplaced</span>
<input class="invisible w-0" name="incident_type" type="radio" value="Misplaced"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:shadow-[0_0_4px_rgba(0,0,0,0.1)] has-[:checked]:text-white text-neutral-text-light dark:text-placeholder-dark text-sm font-medium leading-normal">
<span class="truncate">Stolen</span>
<input checked="" class="invisible w-0" name="incident_type" type="radio" value="Stolen"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:shadow-[0_0_4px_rgba(0,0,0,0.1)] has-[:checked]:text-white text-neutral-text-light dark:text-placeholder-dark text-sm font-medium leading-normal">
<span class="truncate">Damaged</span>
<input class="invisible w-0" name="incident_type" type="radio" value="Damaged"/>
</label>
</div>
</div>
<!-- Text Field: Incident Details -->
<div class="flex w-full flex-col py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-neutral-text-light dark:text-neutral-text-dark text-base font-medium leading-normal pb-2">Describe the incident</p>
<textarea class="form-textarea flex w-full min-w-0 flex-1 resize-y overflow-hidden rounded-lg text-neutral-text-light dark:text-neutral-text-dark focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-neutral-subtle-light dark:border-neutral-subtle-dark bg-input-bg-light dark:bg-input-bg-dark h-32 placeholder:text-placeholder-light dark:placeholder:text-placeholder-dark p-[15px] text-base font-normal leading-normal" placeholder="Please provide as much detail as possible..."></textarea>
</label>
</div>
<!-- Text Field: Date -->
<div class="flex w-full flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-neutral-text-light dark:text-neutral-text-dark text-base font-medium leading-normal pb-2">When did it happen?</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-neutral-text-light dark:text-neutral-text-dark focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-neutral-subtle-light dark:border-neutral-subtle-dark bg-input-bg-light dark:bg-input-bg-dark h-14 placeholder:text-placeholder-light dark:placeholder:text-placeholder-dark p-[15px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal" placeholder="Select date" value=""/>
<div class="text-placeholder-light dark:text-placeholder-dark flex border border-neutral-subtle-light dark:border-neutral-subtle-dark bg-input-bg-light dark:bg-input-bg-dark items-center justify-center pr-[15px] rounded-r-lg border-l-0">
<span class="material-symbols-outlined text-2xl">calendar_today</span>
</div>
</div>
</label>
</div>
<!-- Text Field: Location -->
<div class="flex w-full flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-neutral-text-light dark:text-neutral-text-dark text-base font-medium leading-normal pb-2">Where did it happen?</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-neutral-text-light dark:text-neutral-text-dark focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-neutral-subtle-light dark:border-neutral-subtle-dark bg-input-bg-light dark:bg-input-bg-dark h-14 placeholder:text-placeholder-light dark:placeholder:text-placeholder-dark p-[15px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal" placeholder="Enter location or use current" value=""/>
<div class="text-placeholder-light dark:text-placeholder-dark flex border border-neutral-subtle-light dark:border-neutral-subtle-dark bg-input-bg-light dark:bg-input-bg-dark items-center justify-center pr-[15px] rounded-r-lg border-l-0">
<span class="material-symbols-outlined text-2xl">my_location</span>
</div>
</div>
</label>
</div>
<!-- File Upload Component -->
<div class="flex flex-col gap-4 py-3">
<div>
<p class="text-neutral-text-light dark:text-neutral-text-dark text-base font-medium leading-normal">Add Supporting Files</p>
<p class="text-sm text-placeholder-light dark:text-placeholder-dark pt-1">You can upload photos or a copy of the police report.</p>
</div>
<div class="flex items-center justify-center w-full">
<label class="flex flex-col items-center justify-center w-full h-32 border-2 border-neutral-subtle-light dark:border-neutral-subtle-dark border-dashed rounded-lg cursor-pointer bg-input-bg-light dark:bg-input-bg-dark hover:bg-neutral-subtle-light/30 dark:hover:bg-neutral-subtle-dark/30" for="dropzone-file">
<div class="flex flex-col items-center justify-center pt-5 pb-6">
<span class="material-symbols-outlined text-4xl text-placeholder-light dark:text-placeholder-dark">cloud_upload</span>
<p class="mb-2 text-sm text-placeholder-light dark:text-placeholder-dark"><span class="font-semibold">Click to upload</span> or drag and drop</p>
<p class="text-xs text-placeholder-light dark:text-placeholder-dark">PNG, JPG or PDF (MAX. 5MB)</p>
</div>
<input class="hidden" id="dropzone-file" type="file"/>
</label>
</div>
<!-- Uploaded file preview -->
<div class="flex items-center justify-between rounded-lg p-3 bg-primary/20">
<div class="flex items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary/30">
<span class="material-symbols-outlined text-primary">description</span>
</div>
<div>
<p class="text-sm font-medium text-neutral-text-light dark:text-neutral-text-dark">police_report_final.pdf</p>
<p class="text-xs text-placeholder-light dark:text-placeholder-dark">1.2 MB</p>
</div>
</div>
<button class="text-neutral-text-light dark:text-neutral-text-dark">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
</div>
<!-- CTA Button -->
<div class="sticky bottom-0 mt-auto p-4 bg-background-light dark:bg-background-dark">
<button class="flex h-14 w-full items-center justify-center rounded-xl bg-primary px-4 py-2 text-base font-bold text-white shadow-sm transition-colors hover:bg-primary/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">Submit Report</button>
</div>
</div>
</body></html>
