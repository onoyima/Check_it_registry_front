<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Select Payment Method</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0A2540",
            "secondary": "#2ECC71",
            "background-light": "#F6F9FC",
            "background-dark": "#101922",
            "text-light-body": "#6B7280",
            "text-light-heading": "#1A1F36",
            "text-dark-body": "#9CA3AF",
            "text-dark-heading": "#F9FAFB",
            "border-light": "#E5E7EB",
            "border-dark": "#374151"
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    :root {
      --checkbox-tick-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(255,255,255)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3cpath d=%27M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z%27/%3e%3c/svg%3e');
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col">
<!-- Top App Bar -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-sm">
<div class="flex h-16 items-center px-4">
<button class="flex size-10 shrink-0 items-center justify-center text-text-light-heading dark:text-text-dark-heading">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="flex-1 text-center text-lg font-bold text-text-light-heading dark:text-text-dark-heading tracking-tight">Select Payment</h1>
<div class="size-10 shrink-0"></div> <!-- Spacer -->
</div>
</header>
<main class="flex-1 px-4 pt-4 pb-32">
<!-- Order Summary Card -->
<div class="mb-8 rounded-xl bg-white dark:bg-primary/20 p-4 shadow-sm">
<div class="flex items-start justify-between gap-4">
<div class="flex flex-col gap-1">
<p class="text-sm font-medium text-text-light-body dark:text-text-dark-body">Total Due</p>
<p class="text-2xl font-bold text-text-light-heading dark:text-text-dark-heading">$15.99</p>
<p class="text-sm text-text-light-body dark:text-text-dark-body">Check It - Device Registry</p>
</div>
<div class="flex size-12 items-center justify-center rounded-full bg-primary/10 dark:bg-primary/30 text-primary dark:text-secondary">
<span class="material-symbols-outlined text-3xl">receipt_long</span>
</div>
</div>
</div>
<!-- Saved Methods Section -->
<section>
<h2 class="px-1 pb-3 text-base font-bold text-text-light-heading dark:text-text-dark-heading">Saved Methods</h2>
<div class="divide-y divide-border-light dark:divide-border-dark rounded-xl bg-white dark:bg-primary/20 overflow-hidden shadow-sm">
<!-- List Item: Visa -->
<label class="flex cursor-pointer items-center justify-between gap-4 p-4 min-h-14 hover:bg-background-light dark:hover:bg-background-dark/50 transition-colors">
<div class="flex items-center gap-4">
<img class="h-6 w-10 object-contain shrink-0" data-alt="Visa card logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3kYsp9pJB78nI-g4HodKqboPmzQW9fkiC7cTYS9YoBW53zqGTTjSyw4JAOVRLg1rNQBm346zK6qK8SsGUk0km86LjN3u1yA8lTaPcydygDqm0G49O13buMen1A60IiKsFRBXJxkMVtE_xQc6NcLq7zLGzelHJoNRKgk3ll4xpOrQkSbRAeybJqqG8oNGzohnkb4EBNyAbfY6qGyQHn6BGCSva3D_ypgF4w41raBCdYedBIxjU99VLptVvBnPM1x6mDVBFuPX5PJHe"/>
<p class="text-base font-medium text-text-light-body dark:text-text-dark-body flex-1 truncate">Visa ending in 4242</p>
</div>
<div class="shrink-0">
<div class="flex size-7 items-center justify-center">
<input checked="" class="h-5 w-5 rounded-full border-2 border-border-light dark:border-border-dark bg-transparent text-primary checked:bg-primary checked:border-primary checked:bg-[image:--checkbox-tick-svg] focus:ring-primary focus:ring-offset-0" name="payment_method" type="radio"/>
</div>
</div>
</label>
<!-- List Item: Apple Pay -->
<label class="flex cursor-pointer items-center justify-between gap-4 p-4 min-h-14 hover:bg-background-light dark:hover:bg-background-dark/50 transition-colors">
<div class="flex items-center gap-4">
<img class="h-6 w-10 object-contain shrink-0" data-alt="Apple Pay logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuADiNIKIgvwc3TfiJ15OvTApJquqD5o9IP3G4tFr1g1SeYrqzYuqLrCQG7714SCa3VnPe3ryFrx_R5PkD2FA62HxOhXZ3n0ySHZz87zhsP9D73k3mmInfBQ6xXiJRNnlmOWuv1RQ46X_EGiEAzmxkmS-OKZv-uzAbPSb7jBMYC7tcympfzSdV0V10IIw2hHovJJeUpFlsKYuH0ImhjEg_xODZWWsh8sLbZ5o2KX92RwqSEVpIBP2GZxsnt6NM9Nqt-_aZsEWadOREzI"/>
<p class="text-base font-medium text-text-light-body dark:text-text-dark-body flex-1 truncate">Apple Pay</p>
</div>
<div class="shrink-0">
<div class="flex size-7 items-center justify-center">
<input class="h-5 w-5 rounded-full border-2 border-border-light dark:border-border-dark bg-transparent text-primary checked:bg-primary checked:border-primary checked:bg-[image:--checkbox-tick-svg] focus:ring-primary focus:ring-offset-0" name="payment_method" type="radio"/>
</div>
</div>
</label>
</div>
</section>
<!-- Add New Method Section -->
<section class="mt-8">
<h2 class="px-1 pb-3 text-base font-bold text-text-light-heading dark:text-text-dark-heading">Add New Method</h2>
<div class="divide-y divide-border-light dark:divide-border-dark rounded-xl bg-white dark:bg-primary/20 overflow-hidden shadow-sm">
<!-- Button: Add Credit/Debit Card -->
<button class="flex w-full items-center justify-between gap-4 p-4 min-h-14 text-left hover:bg-background-light dark:hover:bg-background-dark/50 transition-colors">
<div class="flex items-center gap-4">
<div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-background-light dark:bg-background-dark text-text-light-body dark:text-text-dark-body">
<span class="material-symbols-outlined">credit_card</span>
</div>
<p class="text-base font-medium text-text-light-body dark:text-text-dark-body flex-1">Add Credit/Debit Card</p>
</div>
<div class="shrink-0">
<span class="material-symbols-outlined text-text-light-body dark:text-text-dark-body">chevron_right</span>
</div>
</button>
<!-- Button: Link Bank Account -->
<button class="flex w-full items-center justify-between gap-4 p-4 min-h-14 text-left hover:bg-background-light dark:hover:bg-background-dark/50 transition-colors">
<div class="flex items-center gap-4">
<div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-background-light dark:bg-background-dark text-text-light-body dark:text-text-dark-body">
<span class="material-symbols-outlined">account_balance</span>
</div>
<p class="text-base font-medium text-text-light-body dark:text-text-dark-body flex-1">Link Bank Account</p>
</div>
<div class="shrink-0">
<span class="material-symbols-outlined text-text-light-body dark:text-text-dark-body">chevron_right</span>
</div>
</button>
</div>
</section>
</main>
<!-- Bottom CTA Bar -->
<footer class="fixed bottom-0 left-0 right-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-sm p-4 border-t border-border-light dark:border-border-dark">
<div class="flex flex-col gap-3">
<button class="flex h-12 w-full items-center justify-center rounded-xl bg-primary px-4 text-base font-bold text-white shadow-lg transition-all hover:bg-primary/90">
          Pay $15.99
        </button>
<div class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-base text-secondary">lock</span>
<p class="text-xs text-text-light-body dark:text-text-dark-body">Secure payment via Stripe</p>
</div>
</div>
</footer>
</div>
</body></html>
