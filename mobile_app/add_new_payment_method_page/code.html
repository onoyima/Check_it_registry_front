<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Payment Method</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#007AFF",
              "background-light": "#F2F2F7",
              "background-dark": "#101922",
              "success": "#34C759",
              "neutral-text-light": "#1C1C1E",
              "neutral-text-dark": "#F2F2F7",
              "neutral-border-light": "#8E8E93",
              "neutral-border-dark": "#324d67",
              "neutral-placeholder-light": "#8E8E93",
              "neutral-placeholder-dark": "#92adc9",
              "neutral-subtle-bg-light": "#FFFFFF",
              "neutral-subtle-bg-dark": "#192633",
              "error": "#FF3B30",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {
                "DEFAULT": "0.5rem",
                "lg": "0.75rem",
                "xl": "1rem",
                "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative mx-auto flex h-auto min-h-screen w-full max-w-md flex-col">
<!-- Top App Bar -->
<header class="sticky top-0 z-10 flex items-center justify-between border-b border-neutral-border-light/20 bg-background-light/80 p-4 pb-3 backdrop-blur-sm dark:border-neutral-border-dark/20 dark:bg-background-dark/80">
<button class="text-neutral-text-light dark:text-neutral-text-dark flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/5">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="flex-1 text-center text-lg font-bold leading-tight tracking-[-0.015em] text-neutral-text-light dark:text-neutral-text-dark">Add Payment Method</h1>
<div class="size-10 shrink-0"></div> <!-- Spacer -->
</header>
<main class="flex-1 px-4 py-6">
<div class="flex flex-col gap-6">
<!-- Card Details Section -->
<section class="space-y-4">
<h2 class="text-sm font-semibold uppercase text-neutral-placeholder-light dark:text-neutral-placeholder-dark">Card Information</h2>
<!-- Cardholder Name -->
<label class="flex flex-col">
<p class="pb-2 text-base font-medium leading-normal text-neutral-text-light dark:text-neutral-text-dark">Cardholder Name</p>
<input class="form-input flex h-14 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-neutral-border-light/50 bg-neutral-subtle-bg-light p-4 text-base font-normal leading-normal text-neutral-text-light placeholder:text-neutral-placeholder-light focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-neutral-border-dark dark:bg-neutral-subtle-bg-dark dark:text-neutral-text-dark dark:placeholder:text-neutral-placeholder-dark dark:focus:border-primary" placeholder="John Doe" value=""/>
</label>
<!-- Card Number -->
<label class="flex flex-col">
<p class="pb-2 text-base font-medium leading-normal text-neutral-text-light dark:text-neutral-text-dark">Card Number</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input h-14 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-l-lg border border-r-0 border-neutral-border-light/50 bg-neutral-subtle-bg-light p-4 pr-2 text-base font-normal leading-normal text-neutral-text-light placeholder:text-neutral-placeholder-light focus:z-10 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-neutral-border-dark dark:bg-neutral-subtle-bg-dark dark:text-neutral-text-dark dark:placeholder:text-neutral-placeholder-dark dark:focus:border-primary" placeholder="1234 5678 9101 1121" value=""/>
<button class="flex items-center justify-center rounded-r-lg border border-l-0 border-neutral-border-light/50 bg-neutral-subtle-bg-light px-4 text-primary hover:bg-black/5 dark:border-neutral-border-dark dark:bg-neutral-subtle-bg-dark dark:hover:bg-white/5">
<span class="material-symbols-outlined text-2xl">photo_camera</span>
</button>
</div>
</label>
<div class="flex flex-wrap items-start gap-4">
<!-- Expiration Date -->
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal text-neutral-text-light dark:text-neutral-text-dark">Expiration</p>
<input class="form-input flex h-14 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-neutral-border-light/50 bg-neutral-subtle-bg-light p-4 text-base font-normal leading-normal text-neutral-text-light placeholder:text-neutral-placeholder-light focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-neutral-border-dark dark:bg-neutral-subtle-bg-dark dark:text-neutral-text-dark dark:placeholder:text-neutral-placeholder-dark dark:focus:border-primary" placeholder="MM/YY" value=""/>
</label>
<!-- CVC -->
<label class="flex min-w-40 flex-1 flex-col">
<div class="flex items-center gap-2 pb-2">
<p class="text-base font-medium leading-normal text-neutral-text-light dark:text-neutral-text-dark">CVC</p>
<span class="material-symbols-outlined cursor-help text-lg text-neutral-placeholder-light dark:text-neutral-placeholder-dark">help_outline</span>
</div>
<input class="form-input flex h-14 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-neutral-border-light/50 bg-neutral-subtle-bg-light p-4 text-base font-normal leading-normal text-neutral-text-light placeholder:text-neutral-placeholder-light focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-neutral-border-dark dark:bg-neutral-subtle-bg-dark dark:text-neutral-text-dark dark:placeholder:text-neutral-placeholder-dark dark:focus:border-primary" placeholder="123" value=""/>
</label>
</div>
</section>
<!-- Billing Address Section -->
<section class="space-y-4">
<h2 class="text-sm font-semibold uppercase text-neutral-placeholder-light dark:text-neutral-placeholder-dark">Billing Address</h2>
<!-- Country -->
<label class="flex flex-col">
<p class="pb-2 text-base font-medium leading-normal text-neutral-text-light dark:text-neutral-text-dark">Country</p>
<select class="form-select flex h-14 w-full min-w-0 flex-1 appearance-none overflow-hidden rounded-lg border border-neutral-border-light/50 bg-neutral-subtle-bg-light p-4 text-base font-normal leading-normal text-neutral-text-light placeholder:text-neutral-placeholder-light focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-neutral-border-dark dark:bg-neutral-subtle-bg-dark dark:text-neutral-text-dark dark:placeholder:text-neutral-placeholder-dark dark:focus:border-primary">
<option>United States</option>
<option>Canada</option>
<option>Mexico</option>
</select>
</label>
<!-- Address -->
<label class="flex flex-col">
<p class="pb-2 text-base font-medium leading-normal text-neutral-text-light dark:text-neutral-text-dark">Address</p>
<input class="form-input flex h-14 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-neutral-border-light/50 bg-neutral-subtle-bg-light p-4 text-base font-normal leading-normal text-neutral-text-light placeholder:text-neutral-placeholder-light focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-neutral-border-dark dark:bg-neutral-subtle-bg-dark dark:text-neutral-text-dark dark:placeholder:text-neutral-placeholder-dark dark:focus:border-primary" placeholder="123 Main Street" value=""/>
</label>
<div class="flex flex-wrap items-start gap-4">
<!-- City -->
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal text-neutral-text-light dark:text-neutral-text-dark">City</p>
<input class="form-input flex h-14 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-neutral-border-light/50 bg-neutral-subtle-bg-light p-4 text-base font-normal leading-normal text-neutral-text-light placeholder:text-neutral-placeholder-light focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-neutral-border-dark dark:bg-neutral-subtle-bg-dark dark:text-neutral-text-dark dark:placeholder:text-neutral-placeholder-dark dark:focus:border-primary" placeholder="Anytown" value=""/>
</label>
<!-- Postal Code -->
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal text-neutral-text-light dark:text-neutral-text-dark">Postal Code</p>
<input class="form-input flex h-14 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-neutral-border-light/50 bg-neutral-subtle-bg-light p-4 text-base font-normal leading-normal text-neutral-text-light placeholder:text-neutral-placeholder-light focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-neutral-border-dark dark:bg-neutral-subtle-bg-dark dark:text-neutral-text-dark dark:placeholder:text-neutral-placeholder-dark dark:focus:border-primary" placeholder="12345" value=""/>
</label>
</div>
</section>
<!-- Set as Default -->
<div class="flex items-center justify-between rounded-lg bg-neutral-subtle-bg-light p-4 dark:bg-neutral-subtle-bg-dark">
<label class="text-base font-medium text-neutral-text-light dark:text-neutral-text-dark" for="default-payment">Set as Default Payment Method</label>
<input checked="" class="form-checkbox h-6 w-6 cursor-pointer rounded-md border-neutral-border-light/50 bg-neutral-subtle-bg-light text-primary focus:ring-2 focus:ring-primary/50 focus:ring-offset-0 dark:border-neutral-border-dark dark:bg-neutral-subtle-bg-dark dark:checked:bg-primary" id="default-payment" type="checkbox"/>
</div>
</div>
</main>
<footer class="sticky bottom-0 space-y-4 border-t border-neutral-border-light/20 bg-background-light/80 px-4 py-4 backdrop-blur-sm dark:border-neutral-border-dark/20 dark:bg-background-dark/80">
<div class="flex items-start justify-center gap-2 text-center text-xs text-neutral-placeholder-light dark:text-neutral-placeholder-dark">
<span class="material-symbols-outlined mt-0.5 text-base">lock</span>
<p>Your payment information is encrypted and stored securely.</p>
</div>
<button class="flex h-14 w-full items-center justify-center rounded-xl bg-primary text-base font-bold text-white transition-colors hover:bg-primary/90">Save Card</button>
</footer>
</div>
</body></html>
