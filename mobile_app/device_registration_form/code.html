<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register New Device</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1173d4",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col">
<!-- Top App Bar -->
<header class="sticky top-0 z-10 flex items-center justify-between border-b border-white/10 bg-background-light/80 p-4 pb-2 backdrop-blur-sm dark:bg-background-dark/80">
<button class="flex size-10 shrink-0 items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl text-gray-800 dark:text-white">arrow_back</span>
</button>
<h1 class="flex-1 text-center text-lg font-bold leading-tight tracking-[-0.015em] text-gray-900 dark:text-white">Register New Device</h1>
<div class="size-10 shrink-0"></div> <!-- Spacer -->
</header>
<main class="flex-1 px-4 py-6">
<!-- Progress Bar -->
<div class="mb-8 flex flex-col gap-2">
<p class="text-sm font-medium leading-normal text-gray-600 dark:text-gray-400">Step 1 of 1</p>
<div class="h-1.5 w-full rounded-full bg-gray-200 dark:bg-gray-700">
<div class="h-1.5 rounded-full bg-primary" style="width: 50%;"></div>
</div>
</div>
<div class="flex flex-col gap-6">
<!-- Section: Device Details -->
<div>
<h2 class="mb-4 text-lg font-bold leading-tight tracking-[-0.015em] text-gray-900 dark:text-white">Device Details</h2>
<div class="flex flex-col gap-4">
<label class="flex flex-col">
<p class="pb-2 text-sm font-medium leading-normal text-gray-700 dark:text-gray-300">Device Brand</p>
<input class="form-input h-12 w-full resize-none overflow-hidden rounded-lg border border-gray-300 bg-white p-3 text-base font-normal leading-normal text-gray-900 placeholder:text-gray-400 focus:border-primary focus:outline-0 focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary" placeholder="e.g. Apple" value=""/>
</label>
<label class="flex flex-col">
<p class="pb-2 text-sm font-medium leading-normal text-gray-700 dark:text-gray-300">Model</p>
<input class="form-input h-12 w-full resize-none overflow-hidden rounded-lg border border-gray-300 bg-white p-3 text-base font-normal leading-normal text-gray-900 placeholder:text-gray-400 focus:border-primary focus:outline-0 focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary" placeholder="e.g. iPhone 15 Pro" value=""/>
</label>
<label class="flex flex-col">
<div class="flex items-center justify-between pb-2">
<p class="text-sm font-medium leading-normal text-gray-700 dark:text-gray-300">IMEI / Serial Number</p>
<button class="flex items-center gap-1 text-primary">
<span class="material-symbols-outlined text-base">info</span>
</button>
</div>
<div class="relative">
<input class="form-input h-12 w-full resize-none overflow-hidden rounded-lg border border-gray-300 bg-white p-3 pr-12 text-base font-normal leading-normal text-gray-900 placeholder:text-gray-400 focus:border-primary focus:outline-0 focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary" placeholder="Enter number" value=""/>
<button class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-500 hover:text-primary dark:text-gray-400">
<span class="material-symbols-outlined">barcode_scanner</span>
</button>
</div>
</label>
<label class="flex flex-col">
<p class="pb-2 text-sm font-medium leading-normal text-gray-700 dark:text-gray-300">Color</p>
<input class="form-input h-12 w-full resize-none overflow-hidden rounded-lg border border-gray-300 bg-white p-3 text-base font-normal leading-normal text-gray-900 placeholder:text-gray-400 focus:border-primary focus:outline-0 focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary" placeholder="e.g. Natural Titanium" value=""/>
</label>
</div>
</div>
<!-- Section: Proof of Ownership -->
<div>
<h2 class="mb-4 text-lg font-bold leading-tight tracking-[-0.015em] text-gray-900 dark:text-white">Proof of Ownership</h2>
<div class="flex flex-col gap-4">
<label class="flex flex-col">
<p class="pb-2 text-sm font-medium leading-normal text-gray-700 dark:text-gray-300">Purchase Date</p>
<div class="relative">
<input class="form-input h-12 w-full appearance-none resize-none overflow-hidden rounded-lg border border-gray-300 bg-white p-3 pr-10 text-base font-normal leading-normal text-gray-900 placeholder:text-gray-400 focus:border-primary focus:outline-0 focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary" type="date" value=""/>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500 dark:text-gray-400">
<span class="material-symbols-outlined">calendar_today</span>
</div>
</div>
</label>
<label class="flex flex-col">
<p class="pb-2 text-sm font-medium leading-normal text-gray-700 dark:text-gray-300">Purchase Location</p>
<input class="form-input h-12 w-full resize-none overflow-hidden rounded-lg border border-gray-300 bg-white p-3 text-base font-normal leading-normal text-gray-900 placeholder:text-gray-400 focus:border-primary focus:outline-0 focus:ring-2 focus:ring-primary/20 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary" placeholder="e.g. Apple Store, 5th Avenue" value=""/>
</label>
<div>
<p class="pb-2 text-sm font-medium leading-normal text-gray-700 dark:text-gray-300">Upload Proof of Purchase</p>
<div class="flex items-center justify-center rounded-lg border-2 border-dashed border-gray-300 bg-white p-6 dark:border-gray-600 dark:bg-gray-800">
<div class="text-center">
<span class="material-symbols-outlined mx-auto text-4xl text-gray-400 dark:text-gray-500">cloud_upload</span>
<p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
<span class="font-semibold text-primary">Click to upload</span> or drag and drop
                                    </p>
<p class="mt-1 text-xs text-gray-500 dark:text-gray-500">PDF, JPG, or PNG (max. 5MB)</p>
</div>
<input class="absolute h-full w-full cursor-pointer opacity-0" type="file"/>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="sticky bottom-0 mt-auto bg-background-light p-4 dark:bg-background-dark">
<button class="flex h-14 w-full items-center justify-center rounded-xl bg-primary px-6 text-base font-bold text-white shadow-lg transition-colors hover:bg-primary/90 focus:outline-none focus:ring-4 focus:ring-primary/30 disabled:cursor-not-allowed disabled:bg-gray-300 dark:disabled:bg-gray-600">
                Register Device
            </button>
</footer>
</div>
</body></html>
