<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Device Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#00C853", /* Vibrant Green for CTA */
              "background-light": "#f6f7f8",
              "background-dark": "#0A2540", /* Deep Trustworthy Blue */
              "warning": "#FFAB00", /* Cautionary Amber */
              "surface-dark": "#163456", /* Slightly lighter dark for surfaces */
              "text-dark-primary": "#F5F5F5", /* Off-white text */
              "text-dark-secondary": "#A0B3C4", /* Lighter text for secondary info */
              "border-dark": "#2C4A6C", /* Border color for dark theme */
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark font-display" data-alt="Device verification screen for a mobile app.">
<!-- TopAppBar -->
<div class="flex items-center p-4 pb-2">
<div class="flex size-12 shrink-0 items-center text-text-dark-primary">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h1 class="flex-1 text-center text-lg font-bold leading-tight tracking-[-0.015em] text-text-dark-primary">Device Verification</h1>
<div class="size-12 shrink-0"></div> <!-- Spacer to center title -->
</div>
<div class="flex flex-1 flex-col px-4 pt-4">
<!-- BodyText -->
<p class="pb-6 pt-1 text-center text-base font-normal leading-normal text-text-dark-secondary">Enter the device's unique identifier below to begin the verification process.</p>
<!-- TextField -->
<div class="flex w-full flex-wrap items-end gap-4">
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal text-text-dark-primary">IMEI / Serial Number</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input h-14 min-w-0 flex-1 resize-none overflow-hidden rounded-l-lg border border-border-dark bg-surface-dark p-[15px] pr-2 text-base font-normal leading-normal text-text-dark-primary placeholder:text-text-dark-secondary focus:border-primary focus:outline-0 focus:ring-0" placeholder="Enter IMEI / Serial Number" value=""/>
<div class="flex items-center justify-center rounded-r-lg border border-l-0 border-border-dark bg-surface-dark pr-[15px] text-text-dark-secondary">
<span class="material-symbols-outlined text-2xl">qr_code_scanner</span>
</div>
</div>
</label>
</div>
</div>
<div class="mt-auto p-4">
<!-- ActionPanel (Warning/Alert Box) -->
<div class="mb-4 @container">
<div class="flex flex-1 flex-col items-start justify-between gap-4 rounded-xl border border-warning/50 bg-warning/20 p-5 @[480px]:flex-row @[480px]:items-center">
<div class="flex items-start gap-4">
<span class="material-symbols-outlined mt-0.5 text-2xl text-warning">shield_lock</span>
<div class="flex flex-col gap-1">
<p class="text-base font-bold leading-tight text-white">Important Security Notice</p>
<p class="text-sm font-normal leading-normal text-text-dark-secondary">This check must be performed by the device seller on their own phone and account to ensure a valid and secure verification.</p>
</div>
</div>
</div>
</div>
<!-- SingleButton (Primary CTA) -->
<div class="flex justify-center">
<button class="flex h-14 min-w-[84px] max-w-[480px] flex-1 cursor-pointer items-center justify-center overflow-hidden rounded-xl bg-primary px-5 text-base font-bold leading-normal tracking-[0.015em] text-black">
<span class="truncate">Scan &amp; Verify Device</span>
</button>
</div>
</div>
</div>
</body></html>
